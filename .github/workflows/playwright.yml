name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  smoke-matrix:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        env: [qa, staging]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Smoke Tests (${{ matrix.browser }} - ${{ matrix.env }})
      env:
        TEST_ENV: ${{ matrix.env }}
        HEADLESS: true
        SLOW_MO_MS: 0
        PW_WORKERS: 1
        PW_BROWSERS: ${{ matrix.browser }}
      run: npx playwright test --grep @smoke
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-smoke-${{ matrix.browser }}-${{ matrix.env }}
        path: playwright-report/
        retention-days: 30

  regression:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Regression Tests (chromium - qa)
      env:
        TEST_ENV: qa
        HEADLESS: true
        SLOW_MO_MS: 0
        PW_WORKERS: 1
        PW_BROWSERS: chromium
      run: npx playwright test --grep @regression
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-regression
        path: playwright-report/
        retention-days: 30
